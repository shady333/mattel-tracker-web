<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Mattel Stock Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <h1 class="text-xl font-black text-red-600 mb-4">MATTEL LIVE STOCK</h1>
    <div class="grid gap-4">
        {% for p in products %}
        <div class="bg-white p-4 rounded-xl shadow-sm border flex gap-4 items-center">
            <img src="{{ p.image or 'https://via.placeholder.com/100' }}" class="w-16 h-16 object-contain">
            <div>
                <h3 class="font-bold text-sm">{{ p.title }}</h3>
                <p class="text-red-600 font-black text-xl">{{ p.current_qty }} LEFT</p>
                <a href="{{ p.url }}" target="_blank" class="text-[10px] bg-gray-900 text-white px-3 py-1 rounded">BUY NOW</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <p class="text-xs text-gray-400 mt-6 text-center">Last updated: {{ last_updated }}</p>
</body>
</html>
